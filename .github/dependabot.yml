version: 2
updates:
  # Watch npm dependencies for security fixes and version updates.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Bundle minor/patch updates into one PR to reduce noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions used in CI up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
